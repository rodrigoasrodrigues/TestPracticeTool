name: Deploy to AWS Lightsail

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lightsail-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  LIGHTSAIL_SERVICE_NAME: ${{ vars.LIGHTSAIL_SERVICE_NAME }}
  LIGHTSAIL_CONTAINER_NAME: ${{ vars.LIGHTSAIL_CONTAINER_NAME || 'app' }}
  LIGHTSAIL_IMAGE_LABEL: ${{ vars.LIGHTSAIL_IMAGE_LABEL || 'app' }}
  APP_PORT: ${{ vars.APP_PORT || '5000' }}
  AWS_PAGER: ""
  AWS_DEFAULT_OUTPUT: json

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate workflow configuration
        shell: bash
        run: |
          set -euo pipefail
          missing=0

          for name in AWS_REGION LIGHTSAIL_SERVICE_NAME; do
            if [ -z "${!name:-}" ]; then
              echo "::error::Repository variable $name is required."
              missing=1
            fi
          done

          for name in SECRET_KEY AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY; do
            if [ -z "${!name:-}" ]; then
              echo "::error::Repository secret $name is required."
              missing=1
            fi
          done

          has_database_url=0
          has_database_parts=0

          if [ -n "${DATABASE_URL:-}" ]; then
            has_database_url=1
          fi

          if [ -n "${DB_HOST:-}" ] && [ -n "${DB_NAME:-}" ] && [ -n "${DB_USER:-}" ] && [ -n "${DB_PASSWORD:-}" ]; then
            has_database_parts=1
          fi

          if [ "$has_database_url" -ne 1 ] && [ "$has_database_parts" -ne 1 ]; then
            echo "::error::Set either DATABASE_URL or the DB_HOST/DB_NAME/DB_USER/DB_PASSWORD secrets."
            missing=1
          fi

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build Docker image
        run: docker build -t testpracticetool .

      - name: Install Lightsail Control Plugin
        shell: bash
        run: |
          set -euo pipefail
          curl -L "https://s3.us-west-2.amazonaws.com/lightsailctl/latest/linux-amd64/lightsailctl" -o /tmp/lightsailctl
          sudo mv /tmp/lightsailctl /usr/local/bin/lightsailctl
          sudo chmod +x /usr/local/bin/lightsailctl
          lightsailctl --version || true

      - name: Push image to Lightsail
        id: push-image
        shell: bash
        run: |
          set -euo pipefail

          aws lightsail push-container-image \
            --service-name "$LIGHTSAIL_SERVICE_NAME" \
            --label "$LIGHTSAIL_IMAGE_LABEL" \
            --image testpracticetool \
            --output json \
            --no-cli-pager

          echo "Looking up pushed image reference..."
          image_ref=""

          for attempt in 1 2 3 4 5 6; do
            image_ref=$(aws lightsail get-container-images \
              --service-name "$LIGHTSAIL_SERVICE_NAME" \
              --query "reverse(sort_by(containerImages[?contains(image, '.${LIGHTSAIL_IMAGE_LABEL}.')], &createdAt))[0].image" \
              --output text \
              --no-cli-pager)

            if [ -n "$image_ref" ] && [ "$image_ref" != "None" ] && [ "$image_ref" != "null" ]; then
              break
            fi

            echo "Image reference not available yet (attempt $attempt/6); waiting 5 seconds..."
            sleep 5
          done

          if [ -z "$image_ref" ] || [ "$image_ref" = "None" ] || [ "$image_ref" = "null" ]; then
            echo "::error::Unable to determine the pushed Lightsail image reference after upload."
            exit 1
          fi

          echo "Using image reference: $image_ref"
          echo "image_ref=$image_ref" >> "$GITHUB_OUTPUT"

      - name: Build Lightsail deployment spec
        shell: bash
        env:
          IMAGE_REF: ${{ steps.push-image.outputs.image_ref }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DB_DRIVER: ${{ secrets.DB_DRIVER }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          IMAGE_S3_PATH: ${{ secrets.IMAGE_S3_PATH }}
          APP_AWS_REGION: ${{ secrets.APP_AWS_REGION }}
          APP_AWS_ACCESS_KEY_ID: ${{ secrets.APP_AWS_ACCESS_KEY_ID }}
          APP_AWS_SECRET_ACCESS_KEY: ${{ secrets.APP_AWS_SECRET_ACCESS_KEY }}
          APP_AWS_SESSION_TOKEN: ${{ secrets.APP_AWS_SESSION_TOKEN }}
          AWS_S3_ENDPOINT_URL: ${{ secrets.AWS_S3_ENDPOINT_URL }}
        run: |
          set -euo pipefail

          jq -n \
            --arg containerName "$LIGHTSAIL_CONTAINER_NAME" \
            --arg image "$IMAGE_REF" \
            --arg port "$APP_PORT" \
            --arg secretKey "$SECRET_KEY" \
            --arg databaseUrl "${DATABASE_URL:-}" \
            --arg dbDriver "${DB_DRIVER:-mysql+pymysql}" \
            --arg dbHost "${DB_HOST:-}" \
            --arg dbPort "${DB_PORT:-3306}" \
            --arg dbName "${DB_NAME:-}" \
            --arg dbUser "${DB_USER:-}" \
            --arg dbPassword "${DB_PASSWORD:-}" \
            --arg imageS3Path "${IMAGE_S3_PATH:-}" \
            --arg awsRegion "${APP_AWS_REGION:-$AWS_REGION}" \
            --arg awsAccessKeyId "${APP_AWS_ACCESS_KEY_ID:-}" \
            --arg awsSecretAccessKey "${APP_AWS_SECRET_ACCESS_KEY:-}" \
            --arg awsSessionToken "${APP_AWS_SESSION_TOKEN:-}" \
            --arg awsS3EndpointUrl "${AWS_S3_ENDPOINT_URL:-}" \
            '
            def optional_env($key; $value):
              if ($value // "") != "" then {($key): $value} else {} end;

            {
              containers: {
                ($containerName): {
                  image: $image,
                  environment: (
                    {
                      PORT: $port,
                      FLASK_DEBUG: "false",
                      SECRET_KEY: $secretKey
                    }
                    + optional_env("DATABASE_URL"; $databaseUrl)
                    + optional_env("DB_DRIVER"; $dbDriver)
                    + optional_env("DB_HOST"; $dbHost)
                    + optional_env("DB_PORT"; $dbPort)
                    + optional_env("DB_NAME"; $dbName)
                    + optional_env("DB_USER"; $dbUser)
                    + optional_env("DB_PASSWORD"; $dbPassword)
                    + optional_env("IMAGE_S3_PATH"; $imageS3Path)
                    + optional_env("AWS_REGION"; $awsRegion)
                    + optional_env("AWS_ACCESS_KEY_ID"; $awsAccessKeyId)
                    + optional_env("AWS_SECRET_ACCESS_KEY"; $awsSecretAccessKey)
                    + optional_env("AWS_SESSION_TOKEN"; $awsSessionToken)
                    + optional_env("AWS_S3_ENDPOINT_URL"; $awsS3EndpointUrl)
                  ),
                  ports: {
                    ($port): "HTTP"
                  }
                }
              },
              publicEndpoint: {
                containerName: $containerName,
                containerPort: ($port | tonumber),
                healthCheck: {
                  path: "/",
                  successCodes: "200-499",
                  intervalSeconds: 10,
                  timeoutSeconds: 5,
                  healthyThreshold: 2,
                  unhealthyThreshold: 2
                }
              }
            }
            ' > lightsail-deployment.json

          cat lightsail-deployment.json

      - name: Deploy container to Lightsail
        run: |
          aws lightsail create-container-service-deployment \
            --service-name "$LIGHTSAIL_SERVICE_NAME" \
            --cli-input-json file://lightsail-deployment.json
